<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Harga - KHAIRA 3</title>
<style>
body{font-family:Arial; background:#f4f4f4; padding:20px; text-align:center;}
.box{background:white; padding:20px; border-radius:10px; max-width:400px; margin:auto; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
input{width:90%; padding:12px; font-size:18px; margin:10px 0; border:1px solid #ccc; border-radius:5px;}
button{padding:12px 20px; font-size:18px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer;}
#hasil{font-size:24px; font-weight:bold; margin-top:15px; color:#28a745;}
</style>
</head>
<body>
<div class="box">
<h2>KHAIRA 3</h2>
<p>Cek Harga Barang</p>
<input type="text" id="kode" placeholder="Masukkan Kode Barang" onkeyup="cekHarga()">
<div id="hasil">-</div>
</div>

<script>
const dataHarga = {
  "001": 5000,
  "002": 10000,
  "003": 15000,
  "BERAS": 65000
};

function cekHarga(){
  let kode = document.getElementById("kode").value.toUpperCase();
  let harga = dataHarga[kode];
  document.getElementById("hasil").innerText = harga? "Rp " + harga.toLocaleString("id-ID") : "Kode tidak ditemukan";
}
</script>
</body>
</html>
