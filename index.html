function formatRupiah(angka) {
  return "Rp" + angka.toLocaleString('id-ID');
}

function cariBarang() {
  const keyword = document.getElementById("cari").value.toLowerCase();
  const hasilDiv = document.getElementById("hasil");
  const kosongDiv = document.getElementById("kosong");

  if (keyword.length < 1) {
    hasilDiv.innerHTML = "";
    kosongDiv.style.display = "none";
    return;
  }

  const keys = Object.keys(dataHarga).filter(nama => nama.toLowerCase().includes(keyword));

  if (keys.length > 0) {
    kosongDiv.style.display = "none";
    hasilDiv.innerHTML = keys.map(nama => {
      const [modal, jual] = dataHarga[nama];
      const untung = jual - modal;
      return `
      <div class="card">
        <b>${nama}</b>
        <div class="grid-harga">
          <div class="harga-box">
            <div class="label">Modal</div>
            <div class="harga modal">${formatRupiah(modal)}</div>
          </div>
          <div class="harga-box">
            <div class="label">Jual</div>
            <div class="harga jual">${formatRupiah(jual)}</div>
          </div>
          <div class="harga-box">
            <div class="label">Untung</div>
            <div class="harga untung">${formatRupiah(untung)}</div>
          </div>
        </div>
      </div>
      `;
    }).join('');
  } else {
    hasilDiv.innerHTML = "";
    kosongDiv.style.display = "block";
  }
}
